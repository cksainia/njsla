  <title>NJSLA-Adaptive Grade 3 Practice Test</title>
  <style>
:root{--indigo:#4f46e5;--indigo-d:#4338ca;--green:#16a34a;--green-bg:#dcfce7;--red:#dc2626;--red-bg:#fee2e2;--amber:#d97706;--amber-bg:#fef3c7;--ink:#1e293b;--muted:#64748b;--line:#e2e8f0;--bg:#f1f5f9;--card:#fff;--radius:16px;--shadow:0 6px 24px rgba(15,23,42,.08)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:17px;line-height:1.45;-webkit-font-smoothing:antialiased}
#app{min-height:100vh}
h1{font-size:1.8rem;margin:.2em 0 .4em}h2{font-size:1.3rem;margin:1em 0 .4em}h3{margin:0 0 .3em}

.btn{font:inherit;font-weight:600;border:2px solid var(--line);background:var(--card);color:var(--ink);border-radius:12px;padding:11px 18px;cursor:pointer;min-height:46px;transition:transform .08s}
.btn:active{transform:scale(.97)}.btn.primary{background:var(--indigo);color:#fff;border-color:var(--indigo);box-shadow:var(--shadow)}.btn.primary:hover{background:var(--indigo-d)}.btn.primary:disabled{opacity:.5}

.inline{font-weight:600;display:inline-flex;align-items:center;gap:8px}.inline select{font:inherit;padding:8px;border:2px solid var(--line);border-radius:8px}
.help{display:inline-block;width:18px;height:18px;border-radius:50%;background:var(--line);color:var(--muted);text-align:center;font-size:.75rem;line-height:18px}
.app-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px}
.brand{font-weight:800;font-size:1.15rem;display:flex;gap:8px;align-items:center}.brand span{color:var(--indigo)}

/* flow / cards */
.flow{min-height:100vh;display:flex;flex-direction:column}
.flow:not(.wide){align-items:center;justify-content:center;padding:20px}
.flow-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:34px;max-width:560px;width:100%;text-align:center}

.catalog-top{display:flex;gap:24px;flex-wrap:wrap;margin:10px 0}
.test-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}

.test-card:hover{border-color:var(--indigo);transform:translateY(-3px)}.tc-icon{font-size:2.2rem}.tc-title{font-weight:700;margin-top:8px}.tc-meta{color:var(--muted);font-size:.85rem;margin-top:6px}

.att-score{font-weight:800}.link-del{background:none;border:none;color:var(--red);cursor:pointer;font-size:.85rem}

.tds-left{display:flex;align-items:center;gap:12px;flex:1}.tds-mid{font-weight:700;text-align:center;flex:1;font-size:.95em}.tds-right{display:flex;align-items:center;gap:12px;flex:1;justify-content:flex-end}
.tds-stu{font-size:.78rem;opacity:.85}
.tds-btn{font:inherit;background:#334155;color:#fff;border:1px solid #475569;border-radius:8px;padding:7px 12px;cursor:pointer;font-size:.85em}
.tds-btn.primary{background:var(--green);border-color:var(--green);font-weight:700}.tds-btn:disabled{opacity:.5;cursor:default}.tds-btn.shake{animation:shake .4s;background:var(--red)}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.items-menu{position:relative}.items-pop{position:absolute;top:38px;left:0;background:#fff;color:var(--ink);border-radius:10px;box-shadow:var(--shadow);padding:12px;width:320px;z-index:20}

.tds-progress{flex:1;max-width:240px;height:8px;background:#475569;border-radius:99px;overflow:hidden}.tds-progress-fill{height:100%;background:var(--green)}.tds-pct{font-size:.85em;font-variant-numeric:tabular-nums}

.tds-tool{font:inherit;background:#fff;border:1px solid var(--line);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:.85em}.tds-tool.active{background:var(--amber-bg);border-color:var(--amber)}
.tds-body{flex:1;display:flex;flex-direction:column;padding:18px;max-width:1100px;margin:0 auto;width:100%}
.tds-body.two-pane{flex-direction:row;gap:0;max-width:1300px}
.pane{flex:1;overflow:auto;padding:6px 18px}.stimulus-pane{border-right:0}.divider{width:3px;background:var(--line);cursor:col-resize}
.tds-body.line-reader .question-pane{background:linear-gradient(transparent 0,transparent 100%)}
.passage-title{color:var(--indigo);font-size:1.1rem}.passage-author{color:var(--muted);margin-bottom:10px}
.para{position:relative;padding-left:30px;margin:10px 0}.pnum{position:absolute;left:0;color:var(--muted);font-size:.8rem;font-weight:700}
.passage-credit{margin-top:14px;color:var(--muted);font-size:.78rem;font-style:italic}
.q-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.q-num{background:var(--indigo);color:#fff;font-weight:800;border-radius:10px;width:38px;height:38px;display:flex;align-items:center;justify-content:center}
.q-menu{position:relative}.ctx-pop{position:absolute;right:0;top:40px;background:#fff;color:var(--ink);border-radius:10px;box-shadow:var(--shadow);z-index:20;display:flex;flex-direction:column;min-width:200px}
.ctx-pop button{text-align:left;background:none;border:none;border-bottom:1px solid var(--line);padding:12px 14px;cursor:pointer;font:inherit}.ctx-pop button:hover{background:#eef2ff}
.flag-banner{background:var(--amber-bg);color:var(--amber);border-radius:8px;padding:6px 10px;font-size:.85rem;margin-bottom:10px}
.notepad{margin-top:12px}.notepad textarea{width:100%;min-height:80px;border:2px solid var(--amber);border-radius:10px;padding:10px;font:inherit;background:#fffbeb}
.stem{font-size:1.15em;font-weight:600;margin-bottom:14px}
.choices{display:flex;flex-direction:column;gap:10px}
.choice{display:flex;align-items:center;gap:12px;border:2px solid var(--line);border-radius:12px;padding:13px 15px;background:#fff;cursor:pointer}
.choice:hover{border-color:var(--indigo)}.choice.selected{border-color:var(--indigo);background:#eef2ff}.choice.correct{border-color:var(--green);background:var(--green-bg)}.choice.wrong{border-color:var(--red);background:var(--red-bg)}
.choice input{width:20px;height:20px;flex-shrink:0}.choice-letter{font-weight:800;color:var(--indigo);width:22px}
.num-input{font:inherit;font-size:1.3em;padding:12px;border:2px solid var(--line);border-radius:10px;max-width:260px;width:100%}.num-input.small{max-width:90px;font-size:1.1em;display:inline-block;margin:0 6px;vertical-align:middle}
.blank-row{font-size:1.2em;margin:12px 0}
.keypad{display:grid;grid-template-columns:repeat(3,64px);gap:8px;margin-top:16px}
.kp{font:inherit;font-size:1.2rem;height:54px;border:2px solid var(--line);border-radius:10px;background:#fff;cursor:pointer}.kp:active{background:#eef2ff}.kp-back{grid-column:span 1}
.figure{max-width:100%;height:auto;color:var(--ink);margin:10px 0}.figure-wrap{margin:12px 0}
.frac{display:inline-flex;flex-direction:column;text-align:center;vertical-align:middle;line-height:1}.frac .num{border-bottom:2px solid currentColor;padding:0 5px}.frac .den{padding:0 5px}
.math{font-variant-numeric:tabular-nums}
.data-table{border-collapse:collapse;margin:12px 0}.data-table th,.data-table td{border:1px solid var(--line);padding:8px 14px;text-align:center}
.bargraph .bg-hit:hover{fill:rgba(79,70,229,.06)}
.weditor-toolbar{display:flex;gap:4px;flex-wrap:wrap;margin:10px 0;border:1px solid var(--line);border-radius:8px;padding:6px}
.wtool{font:inherit;border:1px solid var(--line);background:#fff;border-radius:6px;padding:6px 10px;cursor:pointer;min-width:34px}
.weditor{min-height:240px;border:2px solid var(--line);border-radius:10px;padding:14px;background:#fff;font-size:1.05em}.weditor:focus{outline:none;border-color:var(--indigo)}
.wcount{color:var(--muted);font-size:.85rem;margin-top:6px}.wplan,.wcheck,.wfmt{background:#f8fafc;border:1px solid var(--line);border-radius:8px;padding:10px 14px;margin:8px 0}.wcheck ul{margin:6px 0}
.tds-bottom{display:flex;align-items:center;gap:12px;padding:12px 18px;border-top:1px solid var(--line);background:#f8fafc}
.tds-bottom .primary{margin-left:auto}.save-msg{color:var(--green);font-weight:600;font-size:.85rem}

/* review + report */
.review{padding:24px;max-width:800px;margin:0 auto}
.review-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin:18px 0}
.review-cell{border:2px solid var(--line);border-radius:10px;padding:14px;cursor:pointer;background:#fff;font:inherit}.review-cell.done{border-color:var(--green);background:var(--green-bg)}.review-cell.todo{border-color:var(--amber)}
.review-actions{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}
.report-main{padding:18px 22px 50px;max-width:840px;margin:0 auto}.report-actions{display:flex;justify-content:center;padding:20px}
.score-card{text-align:center;background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:26px;border-top:8px solid var(--indigo)}
.score-card.level-1,.score-card.level-2{border-top-color:var(--red)}.score-card.level-3{border-top-color:var(--amber)}.score-card.level-4,.score-card.level-5{border-top-color:var(--green)}
.score-big{font-size:3.6rem;font-weight:900;color:var(--indigo);line-height:1}.score-scale{color:var(--muted);font-size:.85rem}
.level-headline{font-size:2.6rem;font-weight:900;color:var(--indigo);line-height:1.05}
.score-card.level-1 .level-headline,.score-card.level-2 .level-headline{color:var(--red)}.score-card.level-3 .level-headline{color:var(--amber)}.score-card.level-4 .level-headline,.score-card.level-5 .level-headline{color:var(--green)}
.level-name{font-size:1.2rem;font-weight:700;margin-top:2px}.scale-row{margin-top:6px;color:var(--muted)}.scale-row strong{color:var(--ink);font-size:1.1rem}
.level-meter .meter-fill{background:linear-gradient(90deg,#ef4444,#f59e0b,#22c55e)}
.meter{height:14px;background:var(--line);border-radius:99px;max-width:480px;margin:14px auto;overflow:hidden}.meter-fill{height:100%;background:linear-gradient(90deg,#ef4444,#f59e0b,#22c55e)}
.level-badge{display:inline-block;font-weight:800;background:#eef2ff;color:var(--indigo);padding:8px 16px;border-radius:99px}
.score-stats{display:flex;gap:18px;justify-content:center;margin-top:12px;color:var(--muted)}
.path{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.path-step{padding:6px 12px;border-radius:99px;font-weight:700;text-transform:capitalize}.path-arrow{color:var(--muted)}
.band-easy{background:#dcfce7;color:#15803d}.band-medium{background:#e0e7ff;color:#4338ca}.band-hard{background:#fee2e2;color:#b91c1c}
.std-list{display:flex;flex-direction:column;gap:8px}.std-row{display:grid;grid-template-columns:1fr 2fr auto;gap:12px;align-items:center;background:#fff;border:2px solid var(--line);border-radius:10px;padding:10px 14px}
.std-row.strength{border-color:var(--green)}.std-row.needs{border-color:var(--red)}
.std-bar{height:12px;background:var(--line);border-radius:99px;overflow:hidden}.std-bar>span{display:block;height:100%;background:var(--indigo)}.std-val{white-space:nowrap;font-weight:700}
.item-table{border-collapse:collapse;width:100%;margin-top:8px;font-size:.9rem}.item-table th,.item-table td{border:1px solid var(--line);padding:6px 10px;text-align:center}
/* dashboard */
.dash-cards{display:flex;gap:14px;flex-wrap:wrap;margin:10px 0 6px}.dash-card{flex:1;min-width:130px;background:#fff;border:2px solid var(--line);border-radius:14px;padding:16px;text-align:center;box-shadow:var(--shadow)}.dc-num{font-size:2rem;font-weight:900;color:var(--indigo)}.dc-lbl{color:var(--muted);font-size:.85rem}
.dash-subjects{display:flex;flex-direction:column;gap:12px}
.dash-subject{background:#fff;border:2px solid var(--line);border-radius:14px;padding:14px 18px}.ds-head{display:flex;justify-content:space-between;align-items:center}.ds-title{font-weight:700}
.ds-body{margin-top:8px}.ds-trend{display:flex;align-items:center;gap:18px;flex-wrap:wrap}.spark{width:240px;height:60px}.ds-trend-meta{font-size:.95rem}
.delta{font-weight:800;margin-left:6px}.delta.up{color:var(--green)}.delta.down{color:var(--red)}.delta.flat{color:var(--muted)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:10px}
.item-table tr.strength td{background:#f0fdf4}.item-table tr.needs td{background:#fef2f2}.item-table tr.developing td{background:#fffbeb}
@media(max-width:760px){.two-col{grid-template-columns:1fr}}

/* Phase 2 item types */
.ebsr-part{margin:14px 0;padding:14px;border:1px solid var(--line);border-radius:12px}.ebsr-label{font-weight:800;color:var(--indigo);margin-bottom:8px}.stem.sub{font-size:1em;font-weight:600;margin:6px 0 10px}
.hot-text{font-size:1.2em;line-height:2.2}.ht-token{cursor:pointer;padding:2px 4px;border-radius:6px;border:1px dashed transparent}.ht-token:hover{border-color:var(--indigo)}.ht-token.sel{background:var(--amber-bg);border-color:var(--amber);border-style:solid;font-weight:700}
.inline-stem{font-size:1.2em;line-height:2.4}.inline-dd{font:inherit;font-size:.9em;padding:6px 8px;border:2px solid var(--indigo);border-radius:8px;background:#eef2ff;margin:0 4px}
.dnd-tokens{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0}.dnd-token{font:inherit;font-size:1.1em;padding:12px 18px;border:2px solid var(--line);border-radius:10px;background:#fff;cursor:pointer}.dnd-token.picked{border-color:var(--indigo);background:#eef2ff;box-shadow:0 0 0 3px rgba(79,70,229,.2)}.dnd-token.placed{opacity:.35;cursor:default}
.dnd-zones{display:flex;gap:16px;flex-wrap:wrap}.dnd-zone{flex:1;min-width:160px;min-height:110px;border:2px dashed var(--indigo);border-radius:12px;padding:10px;cursor:pointer;background:#fafbff}.dz-label{font-weight:700;color:var(--indigo);margin-bottom:8px}.dz-drop{display:flex;flex-wrap:wrap;gap:8px}.dz-chip{background:var(--indigo);color:#fff;border-radius:8px;padding:8px 12px;cursor:pointer}
.match-grid{border-collapse:collapse;margin:12px 0}.match-grid th,.match-grid td{border:1px solid var(--line);padding:10px 18px;text-align:center}.match-grid .mg-row{text-align:left;font-weight:600}.match-grid input{width:20px;height:20px}
.plotline .plot-hit:hover{fill:rgba(79,70,229,.12)}
@media(max-width:760px){.test-cards{grid-template-columns:1fr}.tds-body.two-pane{flex-direction:column}.tds-mid{display:none}.divider{display:none}}
  </style>

  <script>
/* ===== app/content.js ===== */
// Item bank: shared stimuli + items in the canonical schema (spec C.2).
// "Form A" reproduces the items observed in the official Grade 3 practice test
// (passage paraphrased to avoid reprinting copyrighted text). The large legacy
// question bank (data.js globals) is transformed into the same schema to give
// the adaptive engine a deep, domain-tagged pool to route through.

// ---- helpers ----
const DOMAIN_NAMES = {
  OA: 'Operations & Algebraic Thinking',
  NBT: 'Number & Operations in Base Ten',
  NF: 'Number & Operations—Fractions',
  MD: 'Measurement & Data',
  G: 'Geometry',
  RL: 'Reading: Literature',
  RI: 'Reading: Informational',
  L: 'Language & Vocabulary',
  W: 'Written Expression',
};
const SUBJECT_MAP = { math: 'math', reading: 'ela_reading', writing: 'ela_writing' };
const LETTERS = ['A', 'B', 'C', 'D', 'E', 'F'];

function diffToB(d) { return ({ 1: -2, 2: -1, 3: 0, 4: 1, 5: 2 })[d] != null ? ({ 1: -2, 2: -1, 3: 0, 4: 1, 5: 2 })[d] : 0; }
function bToBand(b) { return b <= -1 ? 'easy' : b >= 1 ? 'hard' : 'medium'; }

// ---- shared stimuli (passages / figures) ----
const STIMULI = {
  'passage-never': {
    id: 'passage-never', kind: 'literary',
    title: 'The Meaning of “Never”', author: 'Practice adaptation',
    paragraphs: [
      'Every evening, Jatto sat beside his mother and read to her from his English book. His mother spoke Esan, and she liked to hear the new words even when she did not know them all.',
      'One night Jatto read a sentence that ended with the word “never.” His mother stopped him. “What is this word?” she asked.',
      'Jatto thought for a moment. He wanted to explain it well. “It means not ever,” he said. “Something that will not happen at any time.”',
      'His mother tilted her head. The word sounded heavy and sad to her, like a door closing.',
      'Jatto tried again. He gave her an example about a bird that would never forget its way home.',
      'As he spoke, a leaf came loose from the tree by the window. It floated to the ground like a feather, slowly and gently.',
      'His mother smiled and began a story of her own, a story from when she was a girl. Jatto closed his book and listened.',
      'After a while his mother said, “You can eat while I talk.” She knew he had been reading a long time and needed a rest.',
      'When her story ended, she said something Jatto did not expect. “Never can be a happy word, too,” she told him. “We will never stop sharing our stories.”',
      'Jatto had thought he understood the word perfectly. Now he saw that his mother had taught him a new meaning. “Never” did not have to mean an ending. It could mean forever.',
    ],
    credit: 'Original practice passage written for this app; inspired by the theme of the released item.',
  },
  'passage-sisters': {
    id: 'passage-sisters', kind: 'literary',
    title: 'The Sisters and Their Cat', author: 'Practice adaptation',
    paragraphs: [
      'Sofia and Rosa had wanted a pet for a long time. On Saturday, their family brought home a small gray cat from the shelter.',
      'The cat was shy at first. It hid under the couch and peeked out with wide green eyes.',
      'Sofia set down a soft blanket. Rosa filled a little bowl with water. They sat quietly and waited for the cat to feel safe.',
    ],
    credit: 'Original practice source written for this app.',
  },
};

// ---- Form A: reproduced observed items ----
const FORM_A_ITEMS = [
  // ----- ELA Reading (passage-never) -----
  mc('rA-1', 'ela_reading', 'RL.3.1', 'RL', 'Key Ideas & Details: inference', 0, 'passage-never',
    'Why does Jatto have to explain the meaning of “never” to his mother?',
    ['His mother does not understand all of the English words.', 'His mother has never read the book before.', 'Jatto wants to show how many words he knows.', 'Jatto read the sentence incorrectly.'], 'A',
    'His mother speaks Esan and asks what the word means.'),
  mc('rA-2', 'ela_reading', 'RL.3.4', 'RL', 'Craft & Structure: vocabulary in context', -1, 'passage-never',

function mc(id, subject, standard, dom, skill, b, stim, stem, opts, correct, rationale) {

    stem, media: [], interaction: { options: opts.map((t, i) => ({ id: LETTERS[i], text: t })), shuffle: false },
    answer_key: { correct }, scoring: { points: 1, rule: 'exact' }, rationale, calculator: false,
  };
}
function mcFig(id, standard, dom, skill, b, stem, figure, opts, correct, rationale) {
  const it = mc(id, 'math', standard, dom, skill, b, null, stem, opts, correct, rationale);

function multi(id, subject, standard, dom, skill, b, stim, stem, opts, correct, rationale) {

    id, subject, grade: 3, standard, domain: DOMAIN_NAMES[dom], skill,

// ---- transform the legacy bank (data.js globals) into pool items ----
function transformLegacy() {
  if (typeof QUESTIONS === 'undefined') return [];
  return QUESTIONS.map((q) => {
    const subject = SUBJECT_MAP[q.subject] || 'math';
    const b = diffToB(q.difficulty || 3);
    const base = {
      id: 'legacy-' + q.id, subject, grade: 3, standard: q.standard || '', domain: DOMAIN_NAMES[q.domain] || q.domain,
      skill: q.standard || q.domain, difficulty: b, stage_band: bToBand(b),
      stimulus_ref: q.passage ? 'legacy-' + q.passage : null,
      stem: q.stem, media: [], rationale: q.explanation || '', calculator: false,
    };
    if (q.type === 'mc') {
      base.type = q.passage ? 'multiple_choice' : 'multiple_choice';
      base.interaction = { options: q.choices.map((t, i) => ({ id: LETTERS[i], text: t })), shuffle: false };
      base.answer_key = { correct: LETTERS[q.answer] };
      base.scoring = { points: 1, rule: 'exact' };
    } else if (q.type === 'ms') {
      base.type = 'multi_select';
      base.interaction = { options: q.choices.map((t, i) => ({ id: LETTERS[i], text: t })), selectCount: q.answer.length };
      base.answer_key = { correct: q.answer.map((i) => LETTERS[i]) };
      base.scoring = { points: 1, rule: 'all_or_nothing' };
    } else if (q.type === 'num') {
      base.type = 'numeric_entry';
      base.interaction = { mode: 'integer' };
      base.answer_key = { value: String(q.answer) };
      base.scoring = { points: 1, rule: 'exact' };
    } else if (q.type === 'essay') {
      base.type = 'extended_writing';
      base.interaction = { editor: 'rich' };
      base.plan = ['plan', 'write', 'revise', 'edit'];
      base.checklist = ['clear ideas', 'details and organization', 'correct conventions'];
      base.format = q.stem;
      base.answer_key = null;
      base.scoring = { points: 8, rule: 'rubric' };
      base.mode = q.mode || 'Narrative';
    }
    return base;
  });
}

const LEVELS = [

function levelForScore(s) { return LEVELS.find((l) => s >= l.min && s <= l.max) || LEVELS[0]; }

// Final ability estimate -> NJSLA-style scale score (PRACTICE ESTIMATE; the
// real cut scores are not public). theta ~ [-3,+3] maps across 650..850.
function scaleFromTheta(theta) {
  return Math.max(650, Math.min(850, Math.round(740 + theta * 35)));
}

function normNum(s) {
  return String(s == null ? '' : s).trim().replace(/\s+/g, '').replace(/^\+/, '');
}
function parseFrac(s) {
  const t = normNum(s);
  const m = t.match(/^(-?\d+)\/(\d+)$/);
  if (m) return Number(m[1]) / Number(m[2]);
  if (/^-?\d+(\.\d+)?$/.test(t)) return Number(t);
  return NaN;
}
function setsEqual(a, b) {
  if (!Array.isArray(a) || !Array.isArray(b) || a.length !== b.length) return false;
  const sa = [...a].sort(); const sb = [...b].sort();
  return sa.every((v, i) => v === sb[i]);
}
