  const ak = item.answer_key || {};
  switch (item.type) {
    case 'multiple_choice':
    case 'mc_with_figure': {
      const correct = response != null && response === ak.correct;
      return { correct, partial: correct ? 1 : 0, points: correct ? max : 0, max };
    }
    case 'multi_select': {
      const correct = setsEqual(response, ak.correct);
      // optional partial credit: fraction of correct picks minus wrong picks
      let partial = correct ? 1 : 0;
      if (!correct && Array.isArray(response)) {
        const good = response.filter((r) => ak.correct.includes(r)).length;
        const bad = response.filter((r) => !ak.correct.includes(r)).length;
        partial = Math.max(0, (good - bad) / ak.correct.length);
      }
      return { correct, partial, points: correct ? max : 0, max };
    }
    case 'numeric_entry':
    case 'fraction_entry': {
      let correct = false;
      if (ak.any_of) correct = ak.any_of.map(normNum).includes(normNum(response));
      else if (item.scoring && item.scoring.rule === 'equivalent') {
        const a = parseFrac(response); const b = parseFrac(ak.value);
        correct = !Number.isNaN(a) && !Number.isNaN(b) && Math.abs(a - b) < 1e-9;
      } else correct = normNum(response) === normNum(ak.value);
      return { correct, partial: correct ? 1 : 0, points: correct ? max : 0, max };
    }
    case 'multi_part_entry': {
      const blanks = (item.interaction.blanks || []).map((b) => b.id);
      let got = 0;
      for (const id of blanks) if (response && normNum(response[id]) === normNum(ak[id])) got += 1;
      const correct = got === blanks.length && blanks.length > 0;
      return { correct, partial: blanks.length ? got / blanks.length : 0, points: Math.round((got / Math.max(1, blanks.length)) * max), max };
    }
    case 'bar_graph_build': {
      const cats = item.interaction.categories || Object.keys(ak);
      let got = 0;
      for (const c of cats) if (response && Number(response[c]) === Number(ak[c])) got += 1;
      const correct = got === cats.length;
      return { correct, partial: cats.length ? got / cats.length : 0, points: correct ? max : 0, max };
    }
    case 'extended_writing': {
      // Not auto-scored for correctness; handled by rubric/LLM elsewhere.
      return { correct: null, partial: 0, points: 0, max };
    }
    // ---- Phase 2: tech-enhanced types (spec C.4) ----
    case 'evidence_two_part': {
      const aOK = !!response && response.a === ak.partA;
      const bExp = ak.partB;
      const bOK = aOK && (Array.isArray(bExp) ? setsEqual(response.b, bExp) : (response.b === bExp));
      const correct = aOK && bOK;
      return { correct, partial: aOK ? (bOK ? 1 : 0.5) : 0, points: correct ? max : 0, max };
    }
    case 'hot_text': {
      const correct = setsEqual(response, ak.correct);
      let partial = correct ? 1 : 0;
      if (!correct && Array.isArray(response)) {
        const good = response.filter((r) => ak.correct.includes(r)).length;
        const bad = response.filter((r) => !ak.correct.includes(r)).length;
        partial = Math.max(0, (good - bad) / ak.correct.length);
      }
      return { correct, partial, points: correct ? max : 0, max };
    }
    case 'inline_dropdown': {
      const keys = Object.keys(ak); let got = 0;
      for (const k of keys) if (response && response[k] === ak[k]) got += 1;
      const correct = got === keys.length && keys.length > 0;
      return { correct, partial: keys.length ? got / keys.length : 0, points: correct ? max : 0, max };
    }
    case 'drag_and_drop': {
      const zones = Object.keys(ak); let got = 0;
      for (const z of zones) { const exp = [].concat(ak[z]); const cur = [].concat((response && response[z]) || []); if (setsEqual(cur, exp)) got += 1; }
      const correct = got === zones.length && zones.length > 0;
      return { correct, partial: zones.length ? got / zones.length : 0, points: correct ? max : 0, max };
    }
    case 'matching_grid': {
      const rows = Object.keys(ak); let got = 0;
      for (const r of rows) { const exp = ak[r]; const cur = response && response[r]; const okk = Array.isArray(exp) ? setsEqual([].concat(cur || []), exp) : cur === exp; if (okk) got += 1; }
      const correct = got === rows.length && rows.length > 0;
      return { correct, partial: rows.length ? got / rows.length : 0, points: correct ? max : 0, max };
    }
    case 'graph_point_plot': {
      const tol = ak.tol != null ? ak.tol : 1e-9;
      const a = parseFrac(response && response.pos != null ? response.pos : response);
      const correct = !Number.isNaN(a) && Math.abs(a - ak.value) <= tol;
      return { correct, partial: correct ? 1 : 0, points: correct ? max : 0, max };
    }
    default:
      return { correct: false, partial: 0, points: 0, max };
  }
}

// Rasch (1-PL) ability update for one response.
function updateTheta(theta, b, score, K = 0.5) {
  const p = 1 / (1 + Math.exp(-(theta - b)));
  return theta + K * (score - p);
}

/* ===== app/a11y.js ===== */
// Accessibility helpers: text-to-speech (Web Speech API), and the default
// attribute/a11y state used across the app.

function speak(text) {
  try {
    if (!('speechSynthesis' in window)) return;
    const u = new SpeechSynthesisUtterance(String(text));
    u.lang = 'en-US'; u.rate = 0.95;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(u);
  } catch { /* not available */ }
}

const DEFAULT_ATTRIBUTES = { forced: true, tts: false, contrast: 'bw', masking: false };
const DEFAULT_A11Y = { contrast: 'bw', zoom: 1, lineReader: false, masking: false };

/* ===== app/mathui.js ===== */
// Math rendering (LaTeX-lite), figures (number line / area grid / rectangle),
// the on-screen keypad + equation editor, and the interactive bar-graph builder.

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

// Render \( ... \) inline math: supports \frac{a}{b} and plain text.
function mathRender(text) {
  let t = esc(text);
  t = t.replace(/\\\((.+?)\\\)/g, (_, inner) => '<span class="math">' + renderMath(inner) + '</span>');
  return t;
}
function renderMath(inner) {
  let s = inner;
  s = s.replace(/\\frac\{([^{}]*)\}\{([^{}]*)\}/g, '<span class="frac"><span class="num">$1</span><span class="den">$2</span></span>');
  s = s.replace(/\\times/g, '×').replace(/\\div/g, '÷').replace(/\\gt/g, '&gt;').replace(/\\lt/g, '&lt;');
  return s;
}

// ---- figures ----
function figureHTML(fig) {
  if (!fig) return '';
  if (fig.type === 'numberline') return numberLine(fig);
  if (fig.type === 'areagrid') return areaGrid(fig);
  if (fig.type === 'rectangle') return rectangle(fig);
  return '';
}

function numberLine(f) {
  const W = 420, pad = 30, y = 40, ticks = f.ticks || 4;
  const x = (frac) => pad + frac * (W - 2 * pad);
  let parts = `<line x1="${pad}" y1="${y}" x2="${W - pad}" y2="${y}" stroke="currentColor" stroke-width="2"/>`;
  for (let i = 0; i <= ticks; i++) {
    const fx = x(i / ticks);
    parts += `<line x1="${fx}" y1="${y - 8}" x2="${fx}" y2="${y + 8}" stroke="currentColor" stroke-width="2"/>`;
    const lbl = i === 0 ? '0' : i === ticks ? '1' : '';
    if (lbl) parts += `<text x="${fx}" y="${y + 26}" text-anchor="middle" font-size="14">${lbl}</text>`;
  }
  const px = x((f.point - f.min) / (f.max - f.min));
  parts += `<circle cx="${px}" cy="${y}" r="7" fill="var(--indigo,#4f46e5)"/>`;
  if (f.label) parts += `<text x="${px}" y="${y - 16}" text-anchor="middle" font-size="16" font-weight="700">${esc(f.label)}</text>`;
  return `<svg class="figure" viewBox="0 0 ${W} 70" role="img" aria-label="number line with a plotted point">${parts}</svg>`;
}

function areaGrid(f) {
  const cell = 28, cols = f.cols, rows = f.rows, total = rows * cols;
  let cells = '';
  for (let i = 0; i < total; i++) {
    const r = Math.floor(i / cols), c = i % cols;
    const shaded = i < (f.shaded || 0);
    cells += `<rect x="${c * cell}" y="${r * cell}" width="${cell}" height="${cell}" fill="${shaded ? 'var(--indigo,#4f46e5)' : '#fff'}" stroke="#94a3b8"/>`;
  }
  return `<svg class="figure" viewBox="0 0 ${cols * cell} ${rows * cell}" role="img" aria-label="area grid">${cells}</svg>`;
}

function rectangle(f) {
  const W = 240, H = 150, x = 40, y = 25, w = 150, h = 90;
  const unit = f.unit || '';
  return `<svg class="figure" viewBox="0 0 ${W} ${H}" role="img" aria-label="rectangle figure">
    <rect x="${x}" y="${y}" width="${w}" height="${h}" fill="#eef2ff" stroke="currentColor" stroke-width="2"/>
    <text x="${x + w / 2}" y="${y - 8}" text-anchor="middle" font-size="14">${esc(String(f.w))} ${esc(unit)}</text>
    <text x="${x - 10}" y="${y + h / 2}" text-anchor="end" font-size="14">${esc(String(f.h))} ${esc(unit)}</text>
  </svg>`;
}

// ---- on-screen keypad / equation editor ----
let ACTIVE_INPUT = null;
function setActiveInput(el) { ACTIVE_INPUT = el; }
function keypadHTML(opts = {}) {
  const frac = opts.fraction ? `<button type="button" class="kp" data-k="/" aria-label="fraction bar"><span class="frac"><span class="num">▢</span><span class="den">▢</span></span></button>` : `<button type="button" class="kp" data-k="." aria-label="decimal point">.</button>`;
  const keys = ['7', '8', '9', '4', '5', '6', '1', '2', '3', '0'];
  let grid = keys.map((k) => `<button type="button" class="kp" data-k="${k}">${k}</button>`).join('');
  return `<div class="keypad" role="group" aria-label="math keypad">
    ${grid}
    ${frac}
    <button type="button" class="kp kp-back" data-k="back" aria-label="backspace">⌫</button>
  </div>`;
}
function wireKeypad(root) {
  root.querySelectorAll('.kp').forEach((btn) => {
    btn.onclick = () => {
      if (!ACTIVE_INPUT) return;
      const k = btn.dataset.k;
      if (k === 'back') ACTIVE_INPUT.value = ACTIVE_INPUT.value.slice(0, -1);
      else ACTIVE_INPUT.value += k;
      ACTIVE_INPUT.dispatchEvent(new Event('input', { bubbles: true }));
      ACTIVE_INPUT.focus();
    };
  });
}

// ---- interactive bar-graph builder ----
// Renders clickable columns; clicking at a height sets that bar. Returns markup;
// wireBarGraph attaches behavior and reports state via onChange(state).
function barGraphHTML(item) {
  const cats = item.interaction.categories, yMax = item.interaction.yMax, step = item.interaction.yStep || 1;
  const cw = 70, gap = 24, padL = 40, padB = 30, padT = 16, h = 220;
  const W = padL + cats.length * (cw + gap), H = h + padB + padT;
  const yPix = (v) => padT + (1 - v / yMax) * h;
  let grid = '';
  for (let v = 0; v <= yMax; v += step) {
    const yy = yPix(v);
    grid += `<line x1="${padL}" y1="${yy}" x2="${W}" y2="${yy}" stroke="#e2e8f0"/>`;
    grid += `<text x="${padL - 8}" y="${yy + 4}" text-anchor="end" font-size="11">${v}</text>`;
  }
  let cols = '';
  cats.forEach((c, i) => {
    const x = padL + i * (cw + gap) + gap / 2;
    cols += `<g class="bg-col" data-cat="${esc(c)}" data-x="${x}" data-cw="${cw}">
      <rect class="bg-hit" x="${x}" y="${padT}" width="${cw}" height="${h}" fill="transparent" style="cursor:pointer"/>
      <rect class="bg-bar" x="${x}" y="${padT + h}" width="${cw}" height="0" fill="var(--indigo,#4f46e5)"/>
      <text x="${x + cw / 2}" y="${H - 8}" text-anchor="middle" font-size="13">${esc(c)}</text>
    </g>`;
  });
  return `<svg class="figure bargraph" viewBox="0 0 ${W} ${H}" data-ymax="${yMax}" data-h="${h}" data-padt="${padT}" role="group" aria-label="bar graph builder">${grid}${cols}</svg>`;
}
function wireBarGraph(svg, onChange) {
  const yMax = +svg.dataset.ymax, h = +svg.dataset.h, padT = +svg.dataset.padt;
  const state = {};
  svg.querySelectorAll('.bg-col').forEach((g) => {
    const cat = g.dataset.cat;
    g.querySelector('.bg-hit').addEventListener('click', (e) => {
      const pt = svg.createSVGPoint(); pt.x = e.clientX; pt.y = e.clientY;
      const loc = pt.matrixTransform(svg.getScreenCTM().inverse());
      let val = Math.round((1 - (loc.y - padT) / h) * yMax);
      val = Math.max(0, Math.min(yMax, val));
      state[cat] = val;
      const bar = g.querySelector('.bg-bar');
      const barH = (val / yMax) * h;
      bar.setAttribute('y', padT + h - barH);
      bar.setAttribute('height', barH);
      onChange({ ...state });
    });
  });
}

/* ===== app/items.js ===== */
// ItemRenderer: a renderer + input wiring per item type (spec C.3).
// Renders into a two-pane layout (stimulus left, question right) and reports
// answers back to the engine via run.submit + onChange().


// Returns { stimulusHTML, questionHTML, twoPane }
function renderItem(item) {
  const stim = item.stimulus_ref ? getStimulus(item.stimulus_ref) : null;
  const twoPane = !!stim;
  const stimulusHTML = stim ? stimulusPane(stim) : '';
  const questionHTML = questionPane(item);
  return { stimulusHTML, questionHTML, twoPane };
}

function stimulusPane(stim) {
  if (stim.kind === 'literary' || stim.kind === 'informational') {
    const paras = stim.paragraphs.map((p, i) => `<p class="para"><span class="pnum">${i + 1}</span>${esc(p)}</p>`).join('');
    return `<div class="passage">
      <h3 class="passage-title">${esc(stim.title)}</h3>
      ${stim.author ? `<div class="passage-author">${esc(stim.author)}</div>` : ''}
      ${paras}
      ${stim.credit ? `<div class="passage-credit">${esc(stim.credit)}</div>` : ''}
    </div>`;
  }
  return '';
}

function questionPane(item) {
  let html = '';
  if (item.figure && (item.type === 'extended_writing')) { /* none */ }
  html += `<div class="stem">${mathRender(item.stem)}</div>`;
  if (item.figure) html += `<div class="figure-wrap">${figureHTML(item.figure)}</div>`;
  if (item.table) html += tableHTML(item.table);
  html += `<div class="answer-area">${interactionHTML(item)}</div>`;
  return html;
}

function tableHTML(t) {
  const head = `<tr>${t.headers.map((h) => `<th>${esc(h)}</th>`).join('')}</tr>`;
  const rows = t.rows.map((r) => `<tr>${r.map((c) => `<td>${esc(c)}</td>`).join('')}</tr>`).join('');
  return `<table class="data-table">${head}${rows}</table>`;
}

function interactionHTML(item) {
  switch (item.type) {
    case 'multiple_choice':
    case 'mc_with_figure':
      return choiceHTML(item, 'radio');
    case 'multi_select':
      return `<div class="hint">Choose ${item.interaction.selectCount}.</div>` + choiceHTML(item, 'checkbox');
    case 'numeric_entry':
      return `<input class="num-input keypad-target" id="ans" inputmode="numeric" autocomplete="off" placeholder="Type your answer" />` + keypadHTML();
    case 'fraction_entry':
      return `<input class="num-input keypad-target" id="ans" autocomplete="off" placeholder="e.g. 3/4" />` + keypadHTML({ fraction: true });
    case 'multi_part_entry':
      return item.interaction.blanks.map((b) => blankRow(b)).join('') + keypadHTML();
    case 'bar_graph_build':
      return barGraphHTML(item);
    case 'extended_writing':
      return writingHTML(item);
    // ---- Phase 2 types ----
    case 'evidence_two_part': {
      const pa = item.interaction.partA, pb = item.interaction.partB;
      return `<div class="ebsr">
        <div class="ebsr-part"><div class="ebsr-label">Part A</div>${choiceList(pa.options, 'radio', 'a')}</div>
        <div class="ebsr-part"><div class="ebsr-label">Part B</div><div class="stem sub">${mathRender(pb.stem)}</div>${choiceList(pb.options, pb.multi ? 'checkbox' : 'radio', 'b')}</div>
      </div>`;
    }
    case 'hot_text':
      return `<div class="hint">Click to select. Click again to unselect.</div>
        <div class="hot-text">${item.interaction.tokens.map((t) => `<span class="ht-token" data-id="${t.id}">${esc(t.text)}</span>`).join(' ')}</div>`;
    case 'inline_dropdown': {
      let t = mathRender(item.interaction.template);
      for (const [k, d] of Object.entries(item.interaction.dropdowns)) {
        const sel = `<select class="inline-dd" data-dd="${k}"><option value=""></option>${d.options.map((o) => `<option value="${esc(o)}">${esc(o)}</option>`).join('')}</select>`;
        t = t.replace('{{' + k + '}}', sel);
      }
      return `<div class="inline-stem">${t}</div>`;
    }
    case 'drag_and_drop':
      return `<div class="hint">Tap a tile, then tap a box to place it. Tap a placed tile to remove it.</div>
        <div class="dnd-tokens">${item.interaction.tokens.map((t) => `<button type="button" class="dnd-token" data-id="${t.id}">${esc(t.text)}</button>`).join('')}</div>
        <div class="dnd-zones">${item.interaction.zones.map((z) => `<div class="dnd-zone" data-zone="${z.id}"><div class="dz-label">${esc(z.label)}</div><div class="dz-drop"></div></div>`).join('')}</div>`;
    case 'matching_grid': {
      const { rows, cols, mode } = item.interaction;
      const head = `<tr><th></th>${cols.map((c) => `<th>${esc(c.text)}</th>`).join('')}</tr>`;
      const body = rows.map((r) => `<tr><td class="mg-row">${esc(r.text)}</td>${cols.map((c) => `<td><input type="${mode === 'checkbox' ? 'checkbox' : 'radio'}" name="mg-${r.id}" data-row="${r.id}" data-col="${c.id}" aria-label="${esc(r.text)} ${esc(c.text)}"></td>`).join('')}</tr>`).join('');
      return `<table class="match-grid">${head}${body}</table>`;
    }
    case 'graph_point_plot':
      return plotLineHTML(item.interaction.line);
    default:
      return `<div class="muted">Unsupported item type: ${esc(item.type)}</div>`;
  }
}

function choiceList(options, kind, group) {
  return `<div class="choices" data-group="${group}">` + options.map((o) => `
    <label class="choice">
      <input type="${kind}" name="choice-${group}" value="${o.id}" aria-label="Option ${o.id}" />
      <span class="choice-letter">${o.id}</span><span class="choice-text">${mathRender(o.text)}</span>
    </label>`).join('') + `</div>`;
}

function plotLineHTML(f) {
  const W = 460, pad = 40, y = 50, ticks = f.ticks;
  const x = (i) => pad + (i / ticks) * (W - 2 * pad);
  let parts = `<line x1="${pad}" y1="${y}" x2="${W - pad}" y2="${y}" stroke="currentColor" stroke-width="2"/>`;
  for (let i = 0; i <= ticks; i++) {
    parts += `<line x1="${x(i)}" y1="${y - 9}" x2="${x(i)}" y2="${y + 9}" stroke="currentColor" stroke-width="2"/>`;
    const lbl = i === 0 ? String(f.min) : i === ticks ? String(f.max) : '';
    if (lbl) parts += `<text x="${x(i)}" y="${y + 28}" text-anchor="middle" font-size="14">${lbl}</text>`;
    parts += `<circle class="plot-hit" data-i="${i}" cx="${x(i)}" cy="${y}" r="14" fill="transparent" style="cursor:pointer"/>`;
  }
  parts += `<circle class="plot-pt hidden" cx="0" cy="${y}" r="8" fill="var(--indigo,#4f46e5)"/>`;
  return `<svg class="figure plotline" viewBox="0 0 ${W} 80" data-ticks="${ticks}" data-pad="${pad}" data-w="${W}" role="group" aria-label="number line — tap to plot">${parts}</svg>`;
}

function choiceHTML(item, kind) {
  return `<div class="choices" role="${kind === 'radio' ? 'radiogroup' : 'group'}">` + item.interaction.options.map((o) => `
    <label class="choice">
      <input type="${kind}" name="choice" value="${o.id}" aria-label="Option ${o.id}" />
      <span class="choice-letter">${o.id}</span>
      <span class="choice-text">${mathRender(o.text)}</span>
    </label>`).join('') + `</div>`;
}

function blankRow(b) {
  const parts = String(b.label).split('▢');
  const filled = parts[0] !== undefined ? `${mathRender(parts[0] || '')}<input class="num-input small keypad-target" data-blank="${b.id}" inputmode="numeric" autocomplete="off" />${mathRender(parts[1] || '')}` : '';
  return `<div class="blank-row">${filled}</div>`;
}

function writingHTML(item) {
  const tools = [
    ['bold', 'B', 'Bold'], ['italic', 'I', 'Italic'], ['underline', 'U', 'Underline'],
    ['insertUnorderedList', '•', 'Bullet list'], ['insertOrderedList', '1.', 'Numbered list'],
    ['undo', '↶', 'Undo'], ['redo', '↷', 'Redo'],
  ];
  const toolbar = tools.map(([cmd, lbl, title]) => `<button type="button" class="wtool" data-cmd="${cmd}" title="${title}" aria-label="${title}">${lbl}</button>`).join('');
  const plan = item.plan ? `<div class="wplan"><strong>Manage your time so you can:</strong> ${item.plan.map(esc).join(' · ')}</div>` : '';
  const checklist = item.checklist ? `<div class="wcheck"><strong>Be sure to include:</strong><ul>${item.checklist.map((c) => `<li>${esc(c)}</li>`).join('')}</ul></div>` : '';
  const fmt = item.format ? `<div class="wfmt">${esc(item.format)}</div>` : '';
  return `${plan}${checklist}${fmt}
    <div class="weditor-toolbar" role="toolbar">${toolbar}</div>
    <div id="weditor" class="weditor" contenteditable="true" role="textbox" aria-multiline="true" aria-label="Write your story"></div>
    <div class="wcount"><span id="wcount">0</span> words</div>`;
}

// ---- wiring: restore prior answer + report changes ----
function wireItem(item, run, qEl, onChange) {
  const prev = (run.responses[item.id] || {}).response;
  const report = (val) => { run.submit(item.id, val); onChange && onChange(); };

  if (item.type === 'multiple_choice' || item.type === 'mc_with_figure') {
    qEl.querySelectorAll('input[name="choice"]').forEach((inp) => {
      if (prev === inp.value) inp.checked = true;
      inp.onchange = () => { paintChoices(qEl); report(inp.value); };
    });
    paintChoices(qEl);
  } else if (item.type === 'multi_select') {
    const boxes = [...qEl.querySelectorAll('input[name="choice"]')];
    if (Array.isArray(prev)) boxes.forEach((b) => { if (prev.includes(b.value)) b.checked = true; });
    boxes.forEach((b) => { b.onchange = () => { paintChoices(qEl); report(boxes.filter((x) => x.checked).map((x) => x.value)); }; });
    paintChoices(qEl);
  } else if (item.type === 'numeric_entry' || item.type === 'fraction_entry') {
    const inp = qEl.querySelector('#ans');
    if (prev != null) inp.value = prev;
    inp.addEventListener('focus', () => setActiveInput(inp));
    setActiveInput(inp);
    inp.addEventListener('input', () => report(inp.value.trim()));
    wireKeypad(qEl);
  } else if (item.type === 'multi_part_entry') {
    const inputs = [...qEl.querySelectorAll('input[data-blank]')];
    const collect = () => Object.fromEntries(inputs.map((i) => [i.dataset.blank, i.value.trim()]));
    inputs.forEach((i) => {
      if (prev && prev[i.dataset.blank] != null) i.value = prev[i.dataset.blank];
      i.addEventListener('focus', () => setActiveInput(i));
      i.addEventListener('input', () => report(collect()));
    });
    if (inputs[0]) setActiveInput(inputs[0]);
    wireKeypad(qEl);
  } else if (item.type === 'bar_graph_build') {
    const svg = qEl.querySelector('.bargraph');
    // restore
    if (prev && typeof prev === 'object') {
      svg.querySelectorAll('.bg-col').forEach((g) => {
        const v = prev[g.dataset.cat]; if (v == null) return;
        const h = +svg.dataset.h, padT = +svg.dataset.padt, yMax = +svg.dataset.ymax;
        const bar = g.querySelector('.bg-bar'); const barH = (v / yMax) * h;
        bar.setAttribute('y', padT + h - barH); bar.setAttribute('height', barH);
      });
    }
    wireBarGraph(svg, (state) => report(state));
  } else if (item.type === 'extended_writing') {
    const ed = qEl.querySelector('#weditor');
    if (prev) ed.innerHTML = prev;
    const count = () => { const w = ed.innerText.trim().split(/\s+/).filter(Boolean).length; qEl.querySelector('#wcount').textContent = w; };
    count();
    ed.addEventListener('input', () => { count(); report(ed.innerHTML); });
    qEl.querySelectorAll('.wtool').forEach((b) => { b.onclick = () => { document.execCommand(b.dataset.cmd, false, null); ed.focus(); count(); report(ed.innerHTML); }; });
  } else if (item.type === 'evidence_two_part') {
    const multi = item.interaction.partB.multi;
    const collect = () => {
      const a = qEl.querySelector('input[name="choice-a"]:checked');
      const b = multi ? [...qEl.querySelectorAll('input[name="choice-b"]:checked')].map((x) => x.value)
                      : (qEl.querySelector('input[name="choice-b"]:checked') || {}).value;
      return { a: a ? a.value : null, b: b === undefined ? null : b };
    };
    if (prev) {
      if (prev.a) { const el = qEl.querySelector(`input[name="choice-a"][value="${prev.a}"]`); if (el) el.checked = true; }
      if (prev.b != null) [].concat(prev.b).forEach((v) => { const el = qEl.querySelector(`input[name="choice-b"][value="${v}"]`); if (el) el.checked = true; });
    }
    qEl.querySelectorAll('input[name^="choice-"]').forEach((inp) => { inp.onchange = () => { paintChoices(qEl); report(collect()); }; });
    paintChoices(qEl);
  } else if (item.type === 'hot_text') {
    const sel = new Set(Array.isArray(prev) ? prev : []);
    const paint = () => qEl.querySelectorAll('.ht-token').forEach((t) => t.classList.toggle('sel', sel.has(t.dataset.id)));
    qEl.querySelectorAll('.ht-token').forEach((t) => { t.onclick = () => { const id = t.dataset.id; sel.has(id) ? sel.delete(id) : sel.add(id); paint(); report([...sel]); }; });
    paint();
  } else if (item.type === 'inline_dropdown') {
    const dds = [...qEl.querySelectorAll('.inline-dd')];
    const collect = () => Object.fromEntries(dds.map((d) => [d.dataset.dd, d.value]));
    if (prev) dds.forEach((d) => { if (prev[d.dataset.dd] != null) d.value = prev[d.dataset.dd]; });
    dds.forEach((d) => { d.onchange = () => report(collect()); });
  } else if (item.type === 'drag_and_drop') {
    const state = (prev && typeof prev === 'object') ? { ...prev } : {};
    let picked = null;
    const tokenText = Object.fromEntries(item.interaction.tokens.map((t) => [t.id, t.text]));
    const repaint = () => {
      qEl.querySelectorAll('.dnd-token').forEach((b) => { const placed = Object.values(state).some((arr) => (arr || []).includes(b.dataset.id)); b.classList.toggle('placed', placed); b.classList.toggle('picked', picked === b.dataset.id); });
      qEl.querySelectorAll('.dnd-zone').forEach((z) => { const arr = state[z.dataset.zone] || []; z.querySelector('.dz-drop').innerHTML = arr.map((id) => `<span class="dz-chip" data-id="${id}">${esc(tokenText[id])}</span>`).join(''); });
      qEl.querySelectorAll('.dz-chip').forEach((ch) => { ch.onclick = (e) => { e.stopPropagation(); for (const z of Object.keys(state)) state[z] = (state[z] || []).filter((x) => x !== ch.dataset.id); repaint(); report(state); }; });
    };
    qEl.querySelectorAll('.dnd-token').forEach((b) => { b.onclick = () => { const placed = Object.values(state).some((arr) => (arr || []).includes(b.dataset.id)); if (placed) return; picked = picked === b.dataset.id ? null : b.dataset.id; repaint(); }; });
    qEl.querySelectorAll('.dnd-zone').forEach((z) => { z.onclick = () => { if (!picked) return; const zid = z.dataset.zone; state[zid] = (state[zid] || []).concat(picked); picked = null; repaint(); report(state); }; });
    repaint();
  } else if (item.type === 'matching_grid') {
    const collect = () => { const out = {}; item.interaction.rows.forEach((r) => { const checked = [...qEl.querySelectorAll(`input[data-row="${r.id}"]:checked`)].map((i) => i.dataset.col); out[r.id] = item.interaction.mode === 'checkbox' ? checked : (checked[0] || null); }); return out; };
    if (prev) item.interaction.rows.forEach((r) => { const v = prev[r.id]; if (v == null) return; [].concat(v).forEach((col) => { const el = qEl.querySelector(`input[data-row="${r.id}"][data-col="${col}"]`); if (el) el.checked = true; }); });
    qEl.querySelectorAll('.match-grid input').forEach((inp) => { inp.onchange = () => report(collect()); });
  } else if (item.type === 'graph_point_plot') {
    const svg = qEl.querySelector('.plotline'); const ticks = +svg.dataset.ticks; const pad = +svg.dataset.pad; const W = +svg.dataset.w;
    const pt = svg.querySelector('.plot-pt');
    const place = (i) => { const x = pad + (i / ticks) * (W - 2 * pad); pt.setAttribute('cx', x); pt.classList.remove('hidden'); report({ pos: i / ticks }); };
    if (prev && prev.pos != null) place(Math.round(prev.pos * ticks));
    svg.querySelectorAll('.plot-hit').forEach((h) => { h.addEventListener('click', () => place(+h.dataset.i)); });
  }
}

function paintChoices(qEl) {
  qEl.querySelectorAll('.choice').forEach((c) => {
    const inp = c.querySelector('input');
    c.classList.toggle('selected', inp.checked);
  });
}

// Read-only "show correct" pass for the review/report screens.
function paintCorrectness(item, run, qEl) {
  const r = run.responses[item.id]; if (!r || !r.score) return;
  if (item.type === 'multiple_choice' || item.type === 'mc_with_figure' || item.type === 'multi_select') {
    const correct = [].concat(item.answer_key.correct);
    qEl.querySelectorAll('.choice').forEach((c) => {
      const inp = c.querySelector('input');
      if (correct.includes(inp.value)) c.classList.add('correct');
      if (inp.checked && !correct.includes(inp.value)) c.classList.add('wrong');
      inp.disabled = true;
    });
  }
}

/* ===== app/engine.js ===== */
// Group/multistage adaptive engine (spec C.5).
// - starts at the medium band, routes by SET (not per item),
// - forced response, no re-adapt (routing frozen at set boundaries),
// - blueprint balancing across domains (content fixed, only difficulty varies),
// - 2 sessions for Reading/Math, 1 for Writing.
// Also supports a fixed "Form A" mode that replays the observed items in order.


const SET_UP = 2 / 3, SET_DOWN = 1 / 3;
const BANDS = ['easy', 'medium', 'hard'];
function stepBand(band, dir) {
  const i = Math.max(0, Math.min(2, BANDS.indexOf(band) + dir));
  return BANDS[i];
}

function splitEven(n, k) {
  const base = Math.floor(n / k), rem = n % k;
  return Array.from({ length: k }, (_, i) => base + (i < rem ? 1 : 0));
}

class TestRun {
  constructor({ subject, mode = 'adaptive', length = 'full', settings = {} }) {
    this.subject = subject;
    this.mode = mode;                 // 'adaptive' | 'formA' | 'mock1'..'mock5'
    this.settings = settings;
    this.bp = BLUEPRINT[subject];
    this.domains = this.bp.domains;
    this.setSize = this.bp.setSize;
    const lenCfg = this.bp[length] || this.bp.full;
    this.length = this.bp[length] ? length : 'full';

    this.theta = 0;
    this.band = 'medium';
    this.routedAt = new Set();        // set-boundary indices already routed (freeze)
    this.usedIds = new Set();
    this.delivered = [];              // [{ id, session }]
    this.responses = {};              // id -> { response, score, flagged, notepad, time, answeredAt }
    this.sessionIndex = 0;

    this.isFixed = mode !== 'adaptive';     // 'formA' | 'mock1'..'mock5' are fixed forms
    this.formKey = this.isFixed ? mode : null;
    if (this.isFixed) {
      const form = FORMS[`${subject}__${mode}`] || Object.values(FORMS).find((f) => f.subject === subject);
      this.form = form;
      this.formItems = form ? form.items.slice() : [];
      this.sessions = Math.max(1, Math.min(lenCfg.sessions, this.formItems.length));
      this.sessionSizes = splitEven(this.formItems.length, this.sessions);
      this.totalItems = this.formItems.length;
    } else {
      this.sessions = lenCfg.sessions;
      this.sessionSizes = lenCfg.sessionSizes.slice();
      this.totalItems = this.sessionSizes.reduce((a, b) => a + b, 0);
    }
  }

  // ---- progress ----
  get sessionNumber() { return this.sessionIndex + 1; }
  // items in the CURRENT session (sessions can be uneven, e.g. math 21 + 20)
  get itemsPerSession() { return this.sessionSizes[this.sessionIndex] || this.sessionSizes[this.sessionSizes.length - 1] || 1; }
  sessionDelivered() { return this.delivered.filter((d) => d.session === this.sessionIndex); }
  deliveredCountInSession() { return this.sessionDelivered().length; }
  isSessionComplete() { return this.deliveredCountInSession() >= this.itemsPerSession; }
  isTestComplete() { return this.delivered.length >= this.totalItems; }

  advanceSession() {
    this.sessionIndex += 1;
    if (!this.isFixed) { this.band = 'medium'; } // re-establish medium each session
  }

  // ---- delivery ----
  // Returns the next item to add to the current session, or null if the session
  // is already full / test complete.
  deliverNext() {
    if (this.isTestComplete() || this.isSessionComplete()) return null;
    const idxInSession = this.deliveredCountInSession();

    // Route at set boundaries (adaptive only), based on the just-finished set.
    if (!this.isFixed && idxInSession > 0 && idxInSession % this.setSize === 0) {
      this._routeBand(idxInSession);
    }

    let item;
    if (this.isFixed) {
      const id = this.formItems[this.delivered.length];
      item = ITEMS_BY_ID[id];
    } else {
      const domain = this.domains[idxInSession % this.domains.length];
      item = this._pick(domain, this.band);
    }
    if (!item) return null;
    this.usedIds.add(item.id);
    this.delivered.push({ id: item.id, session: this.sessionIndex });
    return item;
  }

  _routeBand(idxInSession) {
    const key = this.sessionIndex + ':' + idxInSession;
    if (this.routedAt.has(key)) return;        // freeze: route a boundary only once
    this.routedAt.add(key);
    const setItems = this.sessionDelivered().slice(idxInSession - this.setSize, idxInSession);
    let correct = 0;
    for (const d of setItems) { const r = this.responses[d.id]; if (r && r.score && r.score.correct) correct += 1; }
    const acc = setItems.length ? correct / setItems.length : 0.5;
    if (acc >= SET_UP) this.band = stepBand(this.band, +1);
    else if (acc <= SET_DOWN) this.band = stepBand(this.band, -1);
  }

  _pick(domain, band) {
    const pool = ITEMS.filter((it) => it.subject === this.subject && !this.usedIds.has(it.id));
    if (!pool.length) { this.usedIds.clear(); return this._pick(domain, band); }
    const domCode = domain;
    const score = (it) => {
      const dCode = (it.standard.match(/[A-Z]{1,3}/) || [it.domain])[0];
      const domMiss = it.domain && this._domainCode(it) === domCode ? 0 : 5;
      const bandMiss = it.stage_band === band ? 0 : 3;
      return domMiss + bandMiss;
    };
    pool.sort((a, b) => score(a) - score(b) || Math.random() - 0.5);
    return pool[0];
  }

  _domainCode(it) {
    // derive the short domain code (OA/NBT/.../RL/RI/L/W) from the standard
    const s = it.standard || '';
    if (s.startsWith('3.')) return s.split('.')[1];     // 3.OA.A.1 -> OA
    const m = s.match(/^(RL|RI|RF|L|W|SL)/);             // RL.3.1 -> RL
    return m ? m[1] : '';
  }

  // ---- responses ----
  submit(itemId, response) {
    const item = ITEMS_BY_ID[itemId];
    const score = scoreItem(item, response);
    const prev = this.responses[itemId] || {};
    this.responses[itemId] = {
      ...prev, response, score,
      answeredAt: Date.now(),
      time: (prev.time || 0),
    };
    return score;
  }
  addTime(itemId, ms) { const r = this.responses[itemId] || (this.responses[itemId] = {}); r.time = (r.time || 0) + ms; }
  toggleFlag(itemId) { const r = this.responses[itemId] || (this.responses[itemId] = {}); r.flagged = !r.flagged; return r.flagged; }
  setNotepad(itemId, text) { const r = this.responses[itemId] || (this.responses[itemId] = {}); r.notepad = text; }
  isAnswered(itemId) {
    const r = this.responses[itemId];
    if (!r) return false;
    const v = r.response;
    if (v == null) return false;
    if (Array.isArray(v)) return v.length > 0;
    if (typeof v === 'object') return Object.values(v).some((x) => String(x).trim() !== '');
    return String(v).trim() !== '';
  }

  // ---- scoring / report ----
  finalTheta() {
    let theta = 0;
    for (const d of this.delivered) {
      const it = ITEMS_BY_ID[d.id];
      const r = this.responses[d.id];
      if (!r || !r.score || r.score.correct == null) continue; // skip writing
      const s = r.score.correct ? 1 : (r.score.partial || 0);
      theta = updateTheta(theta, it.difficulty || 0, s);
    }
    return theta;
  }

  report() {
    const theta = this.finalTheta(); // kept as an internal ability estimate
    // Reported scale = difficulty-weighted performance (harder items weigh more),
    // so a fully-correct test reaches the 850 ceiling while partial work still
    // differentiates. (θ drives adaptive routing; this drives the parent-facing score.)
    let earned = 0, possible = 0;
    for (const d of this.delivered) {
      const it = ITEMS_BY_ID[d.id];
      const r = this.responses[d.id];
      if (!r || !r.score || r.score.correct == null) continue; // skip writing/unscored
      const w = (it.difficulty || 0) + 3;                       // weight 1..5 (easy..hard)
      possible += w;
      earned += w * (r.score.correct ? 1 : (r.score.partial || 0));
    }
    const perf = possible > 0 ? earned / possible : null;
    const scale = perf == null ? scaleFromTheta(theta) // writing-only: neutral until AI scoring
      : Math.max(650, Math.min(850, Math.round(650 + 200 * perf)));
    const level = levelForScore(scale);
    const perItem = this.delivered.map((d, i) => {
      const it = ITEMS_BY_ID[d.id];
      const r = this.responses[d.id] || {};
      return {
        n: i + 1, id: it.id, domain: it.domain, standard: it.standard, band: it.stage_band,
        correct: r.score ? r.score.correct : null, partial: r.score ? r.score.partial : 0,
        timeMs: r.time || 0, flagged: !!r.flagged,
      };
    });
    const byStandard = {};
    for (const p of perItem) {
      if (p.correct == null) continue;
      const k = p.standard || p.domain;
      byStandard[k] = byStandard[k] || { standard: k, domain: p.domain, total: 0, correct: 0 };
      byStandard[k].total += 1; if (p.correct) byStandard[k].correct += 1;
    }
    // difficulty path: band per set
    const path = [];
    const sd = this.delivered;
    for (let i = 0; i < sd.length; i += this.setSize) {
      const setIt = sd.slice(i, i + this.setSize).map((d) => ITEMS_BY_ID[d.id]);
      path.push(setIt[0] ? setIt[0].stage_band : 'medium');
    }
    const scored = perItem.filter((p) => p.correct != null);
    const correctCount = scored.filter((p) => p.correct).length;
    return {
      subject: this.subject, mode: this.mode, theta: Math.round(theta * 100) / 100,
      scaleScore: scale, level: level.level, levelLabel: level.label,
      total: this.delivered.length, scoredCount: scored.length, correctCount,
      accuracy: scored.length ? Math.round((correctCount / scored.length) * 100) : 0,
      path, byStandard: Object.values(byStandard), perItem,
      flagged: perItem.filter((p) => p.flagged).map((p) => p.n),
    };
  }
}

/* ===== app/player.js ===== */
// Cambium-style test player: top bar (Items map, progress %, title, Pause),
// tools (Line Reader, Zoom), two-pane stimulus/question, per-item context menu
// (Mark for Review / Notepad / Highlight), Back / Next / Save, forced response,
// end-of-session review, and the final parent report.


function startPlayer(opts) {
  const app = document.getElementById('app');
  const run = new TestRun({ subject: opts.subject, mode: opts.mode || 'adaptive', length: opts.length || 'full' });
  const SUBJ = { ela_reading: 'Reading', ela_writing: 'Writing', math: 'Mathematics' };
  const fk = run.formKey || '';
  const formLabel = fk === 'formA' ? ' (Form A)' : /^mock\d$/.test(fk) ? ' (Mock Test ' + fk.slice(4) + ')' : '';
  const title = `NJSLA-A Grade 3 ${SUBJ[opts.subject] || ''} Practice Test` + formLabel;
  const forced = opts.attributes ? opts.attributes.forced !== false : true;
  let cur = 0;            // index within the current session's delivered list
  let itemStart = Date.now();

  // ensure at least one item exists in this session
  if (run.sessionDelivered().length === 0) run.deliverNext();

  function sessionList() { return run.delivered.filter((d) => d.session === run.sessionIndex); }
  function curEntry() { return sessionList()[cur]; }
  function curItem() { const e = curEntry(); return e ? ITEMS_BY_ID[e.id] : null; }

  function recordTime() { const it = curItem(); if (it) run.addTime(it.id, Date.now() - itemStart); itemStart = Date.now(); }

  function render() {
    const list = sessionList();
    const item = curItem();
    const answeredCount = run.delivered.filter((d) => run.isAnswered(d.id)).length;
    const pct = Math.round((answeredCount / run.totalItems) * 100);
    const r = run.responses[item.id] || {};
    const { stimulusHTML, questionHTML, twoPane } = renderItem(item);

    app.innerHTML = `
      <div class="tds ${opts.a11y && opts.a11y.contrast ? 'contrast-' + opts.a11y.contrast : ''}" style="--zoom:${(opts.a11y && opts.a11y.zoom) || 1}">
        <header class="tds-top">
          <div class="tds-left">
            <div class="items-menu">
              <button class="tds-btn" id="items-btn">▾ Items</button>
              <div class="items-pop hidden" id="items-pop">
                <div class="items-legend"><span class="warn">⚠</span> = unanswered</div>
                <div class="items-chips">${list.map((d, i) => chip(d, i)).join('')}</div>
              </div>
            </div>
            <div class="tds-progress"><div class="tds-progress-fill" style="width:${pct}%"></div></div>
            <span class="tds-pct">${pct}%</span>
          </div>
          <div class="tds-mid">${esc(title)}</div>
          <div class="tds-right">
            <span class="tds-stu">${esc(opts.student || 'Guest')} · GUEST SESSION</span>
            <button class="tds-btn" id="pause-btn" title="Pause">⏸ Pause</button>
          </div>
        </header>

        <div class="tds-toolbar">
          <button class="tds-tool" id="line-reader" title="Line Reader">▭ Line Reader</button>
          <button class="tds-tool" id="zoom-out" title="Zoom out">A−</button>
          <button class="tds-tool" id="zoom-in" title="Zoom in">A+</button>
          ${opts.attributes && opts.attributes.tts ? '<button class="tds-tool" id="tts" title="Read aloud">🔊 Read</button>' : ''}
        </div>

        <main class="tds-body ${twoPane ? 'two-pane' : ''}">
          ${twoPane ? `<section class="pane stimulus-pane">${stimulusHTML}</section><div class="divider"></div>` : ''}
          <section class="pane question-pane">
            <div class="q-head">
              <span class="q-num">${cur + 1}</span>
              <div class="q-menu">
                <button class="tds-btn" id="ctx-btn" aria-label="item options">☰</button>
                <div class="ctx-pop hidden" id="ctx-pop">
                  <button data-act="flag">${r.flagged ? '✓ ' : ''}Mark for Review</button>
                  <button data-act="note">Notepad</button>
                  <button data-act="hl">Highlight Selection</button>
                </div>
              </div>
            </div>
            ${r.flagged ? '<div class="flag-banner">⚑ Marked for review</div>' : ''}
            <div id="qcontent">${questionHTML}</div>
            <div id="notepad-wrap" class="notepad ${r.notepad ? '' : 'hidden'}">
              <textarea id="notepad" placeholder="Your notes for this question…">${esc(r.notepad || '')}</textarea>
            </div>
          </section>
        </main>

        <footer class="tds-bottom">
          <button class="tds-btn" id="back-btn" ${cur === 0 && run.sessionIndex === 0 ? 'disabled' : ''}>◀ Back</button>
          <button class="tds-btn" id="save-btn">Save</button>
          <span id="save-msg" class="save-msg"></span>
          <button class="tds-btn primary" id="next-btn">${nextLabel()} ▶</button>
        </footer>
      </div>`;

    wireItem(item, run, document.getElementById('qcontent'), () => updateChrome());
    wireChrome();
    if (opts.a11y && opts.a11y.lineReader) document.getElementById('line-reader').classList.add('active');
  }

  function nextLabel() {
    const list = sessionList();
    if (cur < list.length - 1) return 'Next';
    if (run.isSessionComplete()) return run.sessionNumber < run.sessions ? 'Review & End Session' : 'Review & Finish';
    return 'Next';
  }

  function chip(d, i) {
    const answered = run.isAnswered(d.id);
    const flagged = (run.responses[d.id] || {}).flagged;
    return `<button class="chip ${i === cur ? 'cur' : ''} ${answered ? 'done' : 'todo'}" data-i="${i}">${i + 1}${flagged ? ' ⚑' : ''}${answered ? '' : ' <span class="warn">⚠</span>'}</button>`;
  }

  function updateChrome() {
    // refresh Next enabled state + item map without full re-render
    const item = curItem();
    const nextBtn = document.getElementById('next-btn');
    if (nextBtn) nextBtn.disabled = forced && !run.isAnswered(item.id);
    const pop = document.getElementById('items-pop');
    if (pop) pop.querySelector('.items-chips').innerHTML = sessionList().map((d, i) => chip(d, i)).join('');
    wirePop();
  }

  function wirePop() {
    document.querySelectorAll('.items-chips .chip').forEach((c) => {
      c.onclick = () => { recordTime(); cur = +c.dataset.i; render(); };
    });
  }

  function wireChrome() {
    const item = curItem();
    document.getElementById('items-btn').onclick = () => document.getElementById('items-pop').classList.toggle('hidden');
    document.getElementById('ctx-btn').onclick = () => document.getElementById('ctx-pop').classList.toggle('hidden');
    document.getElementById('pause-btn').onclick = () => { if (confirm('Are you sure you want to pause the test?')) { recordTime(); opts.onExit && opts.onExit(); } };
    document.getElementById('zoom-in').onclick = () => { opts.a11y.zoom = Math.min(2, (opts.a11y.zoom || 1) + 0.15); render(); };
    document.getElementById('zoom-out').onclick = () => { opts.a11y.zoom = Math.max(1, (opts.a11y.zoom || 1) - 0.15); render(); };
    document.getElementById('line-reader').onclick = (e) => { opts.a11y.lineReader = !opts.a11y.lineReader; e.currentTarget.classList.toggle('active'); document.querySelector('.tds-body').classList.toggle('line-reader', opts.a11y.lineReader); };
    const ttsBtn = document.getElementById('tts');
    if (ttsBtn) ttsBtn.onclick = () => speak(stripForTTS(item));

    document.querySelectorAll('#ctx-pop button').forEach((b) => {
      b.onclick = () => {
        const act = b.dataset.act;
        document.getElementById('ctx-pop').classList.add('hidden');
        if (act === 'flag') { run.toggleFlag(item.id); render(); }
        else if (act === 'note') { document.getElementById('notepad-wrap').classList.toggle('hidden'); }
        else if (act === 'hl') { highlightSelection(); }
      };
    });
    const np = document.getElementById('notepad');
    if (np) np.oninput = () => run.setNotepad(item.id, np.value);

    document.getElementById('back-btn').onclick = goBack;
    document.getElementById('next-btn').onclick = goNext;
    document.getElementById('save-btn').onclick = () => { const m = document.getElementById('save-msg'); m.textContent = '✓ Saved'; setTimeout(() => (m.textContent = ''), 1200); };

    wirePop();
    updateChrome();
  }

  function goBack() {
    recordTime();
    if (cur > 0) { cur -= 1; render(); }
    else if (run.sessionIndex > 0) { /* cannot change prior session; stay */ }
  }

  function goNext() {
    const item = curItem();
    if (forced && !run.isAnswered(item.id)) { flashNext(); return; }
    recordTime();
    const list = sessionList();
    if (cur < list.length - 1) { cur += 1; render(); return; }
    if (!run.isSessionComplete()) {
      const it = run.deliverNext();
      if (it) { cur += 1; render(); return; }
    }
    // session full -> review
    reviewScreen();
  }

  function flashNext() {
    const b = document.getElementById('next-btn');
    b.classList.add('shake'); b.textContent = 'Answer first';
    setTimeout(() => { b.classList.remove('shake'); b.textContent = nextLabel() + ' ▶'; }, 1200);
  }

  // ---- review screen (end of a session) ----
  function reviewScreen() {
    const list = sessionList();
    app.innerHTML = `
      <div class="tds review">
        <h1>Review — Session ${run.sessionNumber} of ${run.sessions}</h1>
        <p class="muted">You can change answers in this session. After you end the session, answers are locked.</p>
        <div class="review-grid">
          ${list.map((d, i) => {
            const answered = run.isAnswered(d.id);
            const flagged = (run.responses[d.id] || {}).flagged;
            return `<button class="review-cell ${answered ? 'done' : 'todo'}" data-i="${i}">Q${i + 1} ${flagged ? '⚑' : ''} ${answered ? '✓' : '<span class="warn">⚠ unanswered</span>'}</button>`;
          }).join('')}
        </div>
        <div class="review-actions">
          <button class="tds-btn" id="rev-back">◀ Back to questions</button>
          <button class="tds-btn primary" id="rev-end">${run.sessionNumber < run.sessions ? 'End Session & Start Session ' + (run.sessionNumber + 1) : 'Finish Test'} ▶</button>
        </div>
      </div>`;
    document.querySelectorAll('.review-cell').forEach((c) => { c.onclick = () => { cur = +c.dataset.i; render(); }; });
    document.getElementById('rev-back').onclick = () => { cur = 0; render(); };
    document.getElementById('rev-end').onclick = () => {
      if (run.sessionNumber < run.sessions) {
        run.advanceSession(); cur = 0; run.deliverNext(); itemStart = Date.now(); render();
      } else { finish(); }
    };
  }

  function finish() {
    const report = run.report();
    if (opts.onSaveAttempt) opts.onSaveAttempt({ ...report, student: opts.student, date: new Date().toISOString(), title });
    reportScreen(report);
  }

  function reportScreen(rep) {
    app.innerHTML = renderReport(rep, title, opts.student) + `<div class="report-actions"><button class="tds-btn primary" id="rep-home">🏠 Done</button></div>`;
    document.getElementById('rep-home').onclick = () => opts.onExit && opts.onExit();
  }

  // ---- helpers ----
  function highlightSelection() {
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed) return;
    try {
      const range = sel.getRangeAt(0);
      const span = document.createElement('mark'); span.className = 'user-hl';
      range.surroundContents(span);
      sel.removeAllRanges();
    } catch { /* cross-node selection — ignore */ }
  }

  render();
}

function stripForTTS(item) {
  let t = item.stem.replace(/\\\(|\\\)|\\frac|[{}]/g, ' ');
  if (item.interaction && item.interaction.options) t += '. ' + item.interaction.options.map((o) => 'Option ' + o.id + ', ' + o.text).join('. ');
  return t;
}

// ---- parent report (also reused by the dashboard) ----
function renderReport(rep, title, student) {
  const pct = Math.max(0, Math.min(100, ((rep.scaleScore - 650) / 200) * 100));
  const pathHTML = rep.path.map((b) => `<span class="path-step band-${b}">${b}</span>`).join('<span class="path-arrow">→</span>');
  const stdRows = rep.byStandard.sort((a, b) => (b.correct / b.total) - (a.correct / a.total)).map((s) => {
    const acc = Math.round((s.correct / s.total) * 100);
    const cls = acc >= 75 ? 'strength' : acc < 50 ? 'needs' : 'developing';
    return `<div class="std-row ${cls}"><span class="std-name">${esc(s.standard)} <span class="muted">${esc(s.domain)}</span></span><span class="std-bar"><span style="width:${acc}%"></span></span><span class="std-val">${acc}% <span class="muted">(${s.correct}/${s.total})</span></span></div>`;
  }).join('');
  const itemRows = rep.perItem.map((p) => `<tr>
      <td>${p.n}</td><td>${esc(p.standard || p.domain)}</td><td>${p.band}</td>
      <td>${p.correct == null ? '—' : p.correct ? '✓' : '✗'}</td>
      <td>${(p.timeMs / 1000).toFixed(0)}s</td><td>${p.flagged ? '⚑' : ''}</td></tr>`).join('');
  return `<div class="report">
    <header class="app-header"><div class="brand"><span>Practice Report</span></div></header>
    <main class="report-main">
      <h1>${esc(student || 'Student')} · ${esc(title)}</h1>
      <div class="score-card level-${rep.level}">
        <div class="level-headline">Level ${rep.level} of 5</div>
        <div class="level-name">${esc(rep.levelLabel)}</div>
        <div class="meter level-meter"><div class="meter-fill" style="width:${rep.level * 20}%"></div></div>
        <div class="scale-row">practice scale estimate <strong>${rep.scaleScore}</strong> <span class="muted">/ 850</span></div>
        <div class="muted small">The real NJSLA reports a performance level (1–5); the scale here is a practice estimate, not an official score.</div>
        <div class="score-stats"><span><strong>${rep.correctCount}/${rep.scoredCount}</strong> correct</span><span><strong>${rep.accuracy}%</strong> accuracy</span></div>
      </div>
      <h2>📈 Difficulty path (how the test adapted)</h2>
      <div class="path">${pathHTML}</div>
      <h2>🎯 By standard</h2>
      <div class="std-list">${stdRows || '<p class="muted">—</p>'}</div>
      <h2>🧾 Item details</h2>
      <table class="item-table"><tr><th>#</th><th>Standard</th><th>Band</th><th>Correct</th><th>Time</th><th>Flag</th></tr>${itemRows}</table>
      ${rep.flagged.length ? `<p class="muted">Marked for review: ${rep.flagged.map((n) => 'Q' + n).join(', ')}</p>` : ''}
    </main>
  </div>`;
}

/* ===== app/dashboard.js ===== */
// Detailed parent dashboard: aggregates saved attempts into score trends,
// first→latest progress, and strengths vs. areas to improve.

const SUBJ = { math: 'Mathematics', ela_reading: 'Reading', ela_writing: 'Writing' };
const ICON = { math: '➗', ela_reading: '📖', ela_writing: '✍️' };

function computeDashboard(attempts) {
  const bySubject = {};
  for (const a of attempts) (bySubject[a.subject] = bySubject[a.subject] || []).push(a);
  for (const k in bySubject) bySubject[k].sort((x, y) => new Date(x.date) - new Date(y.date));

  const stdAgg = {}, domAgg = {}; let totalTime = 0, scaleSum = 0, scaleN = 0;
  for (const a of attempts) {
    for (const s of (a.byStandard || [])) {
      const k = s.standard || s.domain;
      (stdAgg[k] = stdAgg[k] || { standard: k, domain: s.domain, total: 0, correct: 0 });
      stdAgg[k].total += s.total; stdAgg[k].correct += s.correct;
      (domAgg[s.domain] = domAgg[s.domain] || { domain: s.domain, total: 0, correct: 0 });
      domAgg[s.domain].total += s.total; domAgg[s.domain].correct += s.correct;
    }
    for (const p of (a.perItem || [])) totalTime += p.timeMs || 0;
    if (typeof a.scaleScore === 'number') { scaleSum += a.scaleScore; scaleN += 1; }
  }
  const acc = (o) => (o.total ? o.correct / o.total : 0);
  const doms = Object.values(domAgg).map((d) => ({ ...d, accuracy: acc(d) }));
  const stds = Object.values(stdAgg).map((s) => ({ ...s, accuracy: acc(s) }));
  return {
    count: attempts.length, bySubject, totalTime,
    avgScale: scaleN ? Math.round(scaleSum / scaleN) : 0,
    domains: doms, standards: stds,
    strengths: doms.filter((d) => d.accuracy >= 0.75).sort((a, b) => b.accuracy - a.accuracy),
    weak: doms.filter((d) => d.accuracy < 0.5).sort((a, b) => a.accuracy - b.accuracy),
    developing: doms.filter((d) => d.accuracy >= 0.5 && d.accuracy < 0.75).sort((a, b) => a.accuracy - b.accuracy),
  };
}

function sparkline(scores) {
  if (scores.length === 0) return '';
  const W = 240, H = 60, pad = 6;
  const min = 650, max = 850;
  const x = (i) => pad + (scores.length === 1 ? (W - 2 * pad) / 2 : (i / (scores.length - 1)) * (W - 2 * pad));
  const y = (v) => pad + (1 - (v - min) / (max - min)) * (H - 2 * pad);
  const pts = scores.map((v, i) => `${x(i)},${y(v)}`).join(' ');
  const dots = scores.map((v, i) => `<circle cx="${x(i)}" cy="${y(v)}" r="3.5" fill="var(--indigo,#4f46e5)"/>`).join('');
  return `<svg class="spark" viewBox="0 0 ${W} ${H}" role="img" aria-label="score trend">
    ${scores.length > 1 ? `<polyline points="${pts}" fill="none" stroke="var(--indigo,#4f46e5)" stroke-width="2.5"/>` : ''}${dots}</svg>`;
}

function fmtTime(ms) { const min = Math.round(ms / 60000); return min < 60 ? `${min} min` : `${Math.floor(min / 60)}h ${min % 60}m`; }

function renderDashboard(attempts, student) {
  if (!attempts.length) {
    return `<div class="report"><header class="app-header"><div class="brand"><span>👪 Parent Dashboard</span></div><button class="btn ghost" id="dash-back">← Back</button></header>
      <main class="report-main"><p class="muted">No saved attempts yet. Finish a test and tap <strong>Save</strong> on the report to start tracking progress here.</p></main></div>`;
  }
  const d = computeDashboard(attempts);

  const subjectBlocks = Object.keys(d.bySubject).map((subj) => {
    const list = d.bySubject[subj];
    const scores = list.map((a) => a.scaleScore);
    const first = list[0], last = list[list.length - 1];
    const delta = last.scaleScore - first.scaleScore;
    const arrow = delta > 0 ? `<span class="delta up">▲ +${delta}</span>` : delta < 0 ? `<span class="delta down">▼ ${delta}</span>` : `<span class="delta flat">▬ 0</span>`;
    const accAvg = Math.round(list.reduce((s, a) => s + (a.accuracy || 0), 0) / list.length);
    return `<div class="dash-subject">
      <div class="ds-head"><span class="ds-title">${ICON[subj] || ''} ${esc(SUBJ[subj] || subj)}</span><span class="muted">${list.length} attempt${list.length === 1 ? '' : 's'}</span></div>
      <div class="ds-body">
        <div class="ds-trend">${sparkline(scores)}<div class="ds-trend-meta">latest <strong class="level-${last.level}">${last.scaleScore}</strong> ${list.length > 1 ? arrow : ''}<div class="muted small">avg accuracy ${accAvg}%</div></div></div>
      </div>
    </div>`;
  }).join('');

  const domBar = (arr, cls) => arr.length ? `<div class="std-list">${arr.map((x) => {
    const a = Math.round(x.accuracy * 100);
    return `<div class="std-row ${cls}"><span class="std-name">${esc(x.domain)}</span><span class="std-bar"><span style="width:${a}%"></span></span><span class="std-val">${a}% <span class="muted">(${x.correct}/${x.total})</span></span></div>`;
  }).join('')}</div>` : '<p class="muted">—</p>';

  // per-standard table (most-practiced first)
  const stdRows = d.standards.sort((a, b) => b.total - a.total).slice(0, 14).map((s) => {
    const a = Math.round(s.accuracy * 100);
    const cls = a >= 75 ? 'strength' : a < 50 ? 'needs' : 'developing';
    return `<tr class="${cls}"><td>${esc(s.standard)}</td><td>${esc(s.domain)}</td><td>${a}%</td><td>${s.correct}/${s.total}</td></tr>`;
  }).join('');

  return `<div class="report dashboard-view">
    <header class="app-header"><div class="brand"><span>👪 Parent Dashboard</span></div><button class="btn ghost" id="dash-back">← Back</button></header>
    <main class="report-main">
      <h1>${esc(student || 'Student')} — Progress Overview</h1>
      <div class="dash-cards">
        <div class="dash-card"><div class="dc-num">${d.count}</div><div class="dc-lbl">tests taken</div></div>
        <div class="dash-card"><div class="dc-num">${d.avgScale}</div><div class="dc-lbl">avg scale score</div></div>
        <div class="dash-card"><div class="dc-num">${fmtTime(d.totalTime)}</div><div class="dc-lbl">time on task</div></div>
      </div>

      <h2>📈 Score progression</h2>
      <div class="dash-subjects">${subjectBlocks}</div>

      <div class="two-col">
        <div><h2>💪 Strong areas</h2>${domBar(d.strengths, 'strength')}</div>
        <div><h2>🎯 Areas to improve</h2>${domBar(d.weak.length ? d.weak : d.developing, d.weak.length ? 'needs' : 'developing')}</div>
      </div>

      <h2>🧾 By standard (most practiced)</h2>
      <table class="item-table"><tr><th>Standard</th><th>Domain</th><th>Accuracy</th><th>Items</th></tr>${stdRows}</table>
      <p class="muted small">Accuracy aggregates every saved attempt. Green ≥ 75%, amber 50–74%, red &lt; 50%.</p>
    </main>
  </div>`;
}

      <div class="flow-card">
        <h1>Instructions</h1>
        <p class="instructions">${esc(INSTRUCTIONS[t.subject])}</p>
        <details class="attr-view"><summary>View Testing Attributes</summary>
          <ul>
            <li>Color contrast: ${esc(state.a11y.contrast)}</li>
            <li>Text-to-Speech: ${state.attributes.tts ? 'On' : 'Off'}</li>
            <li>Zoom: ${state.a11y.zoom}×</li>
            <li>Require answer before moving on: ${state.attributes.forced ? 'Yes' : 'No'}</li>
          </ul>
        </details>
        <div class="btn-row">
          <button class="btn" id="back">Go Back</button>
          <button class="btn primary" id="begin">Begin Test Now ▶</button>
        </div>
      </div>
    </div>`;
  document.getElementById('back').onclick = catalog;
  document.getElementById('begin').onclick = () => beginTest(t);
}

function beginTest(t) {
  startPlayer({
    subject: t.subject,
    mode: state.mode,
    length: state.length,
    student: state.student,
    attributes: state.attributes,
    a11y: { ...state.a11y },
    onSaveAttempt: (rep) => saveAttempt(rep),
    onExit: catalog,
  });
}

function showReport(a) {
  app.innerHTML = renderReport(a, a.title, a.student) + `<div class="report-actions"><button class="tds-btn primary" id="back">◀ Back to dashboard</button></div>`;
  document.getElementById('back').onclick = catalog;
}

// boot
signIn();

  </script>
  <script>
    if ('serviceWorker' in navigator) { window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {})); }
  </script>
</body>
